<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewtual - Mensajes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandOrange: '#F59E0B', brandCrema: '#FEFBF6' } } } }
    </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-md bg-brandCrema min-h-screen shadow-lg flex flex-col p-6 relative pb-24">
        
        <h1 class="text-xl font-bold text-gray-800 mb-4">Mensajes</h1>

        <div class="mb-4">
            <input type="text" placeholder="Buscar conversaciones..." class="w-full px-4 py-2.5 rounded-full border border-gray-100 focus:outline-none focus:border-brandOrange bg-white shadow-sm text-sm">
        </div>

        <div class="space-y-1 divide-y divide-gray-50 overflow-y-auto">
            <a href="{% url 'chat:chat_individual' chat_id=1 %}" class="flex items-center justify-between py-3 hover:bg-white hover:px-2 rounded-xl transition">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 rounded-full bg-gray-200 overflow-hidden relative">
                        <img src="https://placekitten.com/100/100" class="object-cover w-full h-full">
                        <span class="absolute top-0 right-0 w-3 h-3 bg-brandOrange rounded-full border-2 border-white"></span>
                    </div>
                    <div>
                        <h4 class="font-bold text-sm text-gray-800">María (Luna)</h4>
                        <p class="text-xs text-gray-400 truncate max-w-[180px]">Hola! Me encantaría coordinar una cita</p>
                    </div>
                </div>
                <span class="text-[10px] text-gray-400 whitespace-nowrap">Hace 5 min</span>
            </a>
            
            <a href="{% url 'chat:chat_individual' chat_id=2 %}" class="flex items-center justify-between py-3 hover:bg-white hover:px-2 rounded-xl transition">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 rounded-full bg-gray-200 overflow-hidden">
                        <img src="https://placekitten.com/101/101" class="object-cover w-full h-full">
                    </div>
                    <div>
                        <h4 class="font-bold text-sm text-gray-800">Carlos (Milo)</h4>
                        <p class="text-xs text-gray-400 truncate max-w-[180px]">¿Cuándo podríamos encontrarnos?</p>
                    </div>
                </div>
                <span class="text-[10px] text-gray-400 whitespace-nowrap">Hace 1h</span>
            </a>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-3 flex justify-around items-center shadow-lg rounded-t-2xl">
    <a href="{% url 'matching:home' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
        <span class="text-xs font-medium">Inicio</span>
    </a>
    <a href="{% url 'matching:swipe' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
        <span class="text-xs font-medium">Match</span>
    </a>
    <a href="{% url 'chat:lista_chats' %}" class="flex flex-col items-center text-brandOrange">
        <span class="text-xs font-medium">Chats</span>
    </a>
    <a href="{% url 'cats:mis_gatos' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
        <span class="text-xs font-medium">Mis Gatos</span>
    </a>
    <a href="{% url 'users:logout' %}" 
       class="flex items-center gap-1.5 bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-full text-xs font-semibold border border-red-200 transition duration-200 shadow-sm transform active:scale-95 ml-1" 
       title="Cerrar sesión">
        <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        <span>Salir</span>
    </a>
</div>
    </div>
</body>
</html>
