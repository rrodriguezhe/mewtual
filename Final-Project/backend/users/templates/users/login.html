<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewtual - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandOrange: '#F59E0B',
                        brandCrema: '#FEFBF6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-brandCrema min-h-screen shadow-lg flex flex-col justify-between p-8 relative">
        
        {% load static %}

        <div class="text-center mt-12">
            <div class="bg-brandOrange w-24 h-24 rounded-full overflow-hidden mx-auto shadow-md mb-4">
                <img 
                    src="{% static 'users/Logo_Mewtual.png' %}" 
                    class="w-full h-full object-cover"
                >
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Mewtual</h1>
            <p class="text-gray-500 text-sm mt-2">Encuentra la pareja perfecta para tu gato</p>
        </div>

        <form action="{% url 'users:login' %}" method="POST" class="space-y-4 my-auto">
            {% csrf_token %}

            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <div class="p-3 rounded-xl text-sm {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-200{% else %}bg-green-100 text-green-700 border border-green-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

            <div>
                <label class="block text-gray-600 text-sm font-medium mb-1">Nombre de usuario o correo electrónico</label>

                <input type="text" name="email" required placeholder="ej: tu@email.com o catlover123" class="w-full px-4 py-3 rounded-full border border-gray-200 focus:outline-none focus:border-brandOrange bg-white shadow-sm transition">
            </div>
            <div>
                <label class="block text-gray-600 text-sm font-medium mb-1">Contraseña</label>

                <input type="password" name="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-full border border-gray-200 focus:outline-none focus:border-brandOrange bg-white shadow-sm transition">
            </div>
            <div class="text-right">
                <a href="{% url 'users:password_reset' %}" class="text-xs text-gray-400 hover:underline">¿Olvidaste tu contraseña?</a>
            </div>
            
            <button type="submit" class="w-full bg-brandOrange text-white font-semibold py-3.5 rounded-full shadow-md hover:bg-opacity-90 transition transform active:scale-95 mt-4 block text-center">
                Iniciar sesión
            </button>

            <div class="text-center mb-8">
            <p class="text-sm text-gray-500">
                ¿No tienes cuenta? <a href="{% url 'users:register' %}" class="text-brandOrange font-semibold hover:underline">Crear cuenta</a>
            </p>
        </div>
        
        </form>
    </div>
</body>
</html>
