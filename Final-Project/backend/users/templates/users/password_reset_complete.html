<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewtual - Contraseña Actualizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandOrange: '#F59E0B',
                        brandCrema: '#FEFBF6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-brandCrema min-h-screen shadow-lg flex flex-col justify-center items-center p-8 relative text-center">

        <span class="text-6xl mb-4">✅</span>
        <h1 class="text-2xl font-bold text-gray-800 tracking-tight mb-2">Tu contraseña fue actualizada</h1>
        <p class="text-gray-500 text-sm mb-8">
            Ya puedes iniciar sesión con tu nueva contraseña.
        </p>

        <a href="{% url 'users:login' %}" class="w-full bg-brandOrange text-white font-semibold py-3.5 rounded-full shadow-md hover:bg-opacity-90 transition transform active:scale-95 block text-center">
            Iniciar sesión
        </a>
    </div>
</body>
</html>
