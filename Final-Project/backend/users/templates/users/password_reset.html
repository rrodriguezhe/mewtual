<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewtual - Recuperar Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandOrange: '#F59E0B',
                        brandCrema: '#FEFBF6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen font-sans">
    <div class="w-full max-w-md bg-brandCrema min-h-screen shadow-lg flex flex-col justify-between p-8 relative">

        {% load static %}

        <div class="text-center mt-12">
            <div class="bg-brandOrange w-24 h-24 rounded-full overflow-hidden mx-auto shadow-md mb-4">
                <img
                    src="{% static 'users/Logo_Mewtual.png' %}"
                    class="w-full h-full object-cover"
                >
            </div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Recuperar contraseña</h1>
            <p class="text-gray-500 text-sm mt-2">Te enviaremos un enlace para restablecer tu contraseña.</p>
        </div>

        <form method="POST" class="space-y-4 my-auto">
            {% csrf_token %}

            {% if form.errors %}
            <div class="mb-4 p-3 rounded-xl text-sm bg-red-100 text-red-700 border border-red-200">
                {% for field in form %}{% for error in field.errors %}{{ error }}{% endfor %}{% endfor %}
            </div>
            {% endif %}

            <div>
                <label class="block text-gray-600 text-sm font-medium mb-1">Correo electrónico</label>
                <input type="email" name="email" required placeholder="tu@email.com" class="w-full px-4 py-3 rounded-full border border-gray-200 focus:outline-none focus:border-brandOrange bg-white shadow-sm transition">
            </div>

            <button type="submit" class="w-full bg-brandOrange text-white font-semibold py-3.5 rounded-full shadow-md hover:bg-opacity-90 transition transform active:scale-95 mt-4 block text-center">
                Enviar enlace de recuperación
            </button>

            <div class="text-center mb-8">
                <p class="text-sm text-gray-500">
                    <a href="{% url 'users:login' %}" class="text-brandOrange font-semibold hover:underline">Volver a iniciar sesión</a>
                </p>
            </div>
        </form>
    </div>
</body>
</html>
