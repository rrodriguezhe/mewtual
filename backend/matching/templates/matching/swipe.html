<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewtual - Descubre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandOrange: '#F59E0B', brandCrema: '#FEFBF6', brandGreen: '#10B981' } } } }
    </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-md bg-brandCrema min-h-screen shadow-lg flex flex-col p-6 relative pb-24">
        
        <div class="mt-2 mb-4 text-center">
            <h1 class="text-xl font-bold text-gray-800">Descubre</h1>
            <p class="text-xs text-gray-400">Desliza para encontrar matches</p>
        </div>

        <div class="flex-1 bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden flex flex-col relative mb-4">
            
            <div class="relative w-full h-64 bg-gray-200">
                <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=500&auto=format&fit=crop" alt="Milo" class="w-full h-full object-cover">
                
                <span class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm text-brandGreen font-semibold text-xs px-3 py-1 rounded-full flex items-center shadow-sm">
                    <span class="w-2 h-2 bg-brandGreen rounded-full inline-block mr-1.5"></span> Vacunado
                </span>
            </div>

            <div class="p-5 flex-1 flex flex-col justify-between">
                <div>
                    <div class="flex items-baseline space-x-2">
                        <h2 class="text-2xl font-bold text-gray-800">Milo</h2>
                        <span class="text-lg text-gray-500 font-medium">3 años</span>
                    </div>
                    <p class="text-sm font-semibold text-brandOrange mt-0.5">Siamés</p>
                    <p class="text-xs text-gray-400 mt-1 flex items-center">
                        📍 4.1 km de distancia
                    </p>
                    <p class="text-gray-600 text-sm mt-3 leading-relaxed">
                        Muy juguetón y sociable. Ama la compañía.
                    </p>
                </div>

                <div class="flex justify-center space-x-6 mt-4">
                    <button class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-gray-400 font-bold text-xl shadow-md border border-gray-100 hover:text-red-500 hover:scale-105 active:scale-95 transition">
                        X
                    </button>
                    <button class="w-14 h-14 bg-brandOrange rounded-full flex items-center justify-center text-white font-bold text-2xl shadow-lg hover:bg-opacity-90 hover:scale-105 active:scale-95 transition">
                        ♥
                    </button>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-3 flex justify-around items-center shadow-lg rounded-t-2xl">
            <a href="{% url 'matching:home' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
                <span class="text-xs font-medium">Inicio</span>
            </a>
            <a href="{% url 'matching:swipe' %}" class="flex flex-col items-center text-brandOrange">
                <span class="text-xs font-medium">Match</span>
            </a>
            <a href="{% url 'chat:lista_chats' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
                <span class="text-xs font-medium">Chats</span>
            </a>
            <a href="{% url 'cats:mis_gatos' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
                <span class="text-xs font-medium">Mis Gatos</span>
            </a>
            <a href="{% url 'users:logout' %}" 
            class="flex items-center gap-1.5 bg-red-50 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-full text-xs font-semibold border border-red-200 transition duration-200 shadow-sm transform active:scale-95 ml-1" 
            title="Cerrar sesión">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                <span>Salir</span>
             </a>
        </div>

    </div>
</body>
</html>
