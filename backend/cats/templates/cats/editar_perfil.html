<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewtual - Editar Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandOrange: '#F59E0B', brandCrema: '#FEFBF6', brandGreen: '#10B981' } } } }
    </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-md bg-brandCrema min-h-screen shadow-lg flex flex-col p-6 relative pb-24">
        
        <div class="flex items-center space-x-4 mb-6">
            <a href="{% url 'cats:mis_gatos' %}" class="text-gray-600 text-xl font-bold">&larr;</a>
            <h1 class="text-xl font-bold text-gray-800">Editar Perfil</h1>
        </div>

        <div class="text-center mb-6 relative">
            <div class="w-28 h-28 rounded-full bg-gray-300 mx-auto overflow-hidden border-4 border-white shadow-sm">
                <img src="https://placekitten.com/200/200" alt="Gato" class="w-full h-full object-cover">
            </div>
            <button class="absolute bottom-0 right-[38%] bg-brandOrange p-2 rounded-full text-white shadow-md hover:scale-105 transition">
                📸
            </button>
            <p class="text-xs text-gray-400 mt-2">Toca para cambiar foto</p>
        </div>

        <form action="" method="POST" class="space-y-4 overflow-y-auto max-h-[50vh] pr-1">
            {% csrf_token %}
            <div>
                <label class="block text-gray-500 text-sm font-medium mb-1">Nombre</label>
                <input type="text" value="Simba" class="w-full px-4 py-2.5 rounded-xl border border-gray-100 focus:outline-none focus:border-brandOrange bg-white shadow-sm">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-500 text-sm font-medium mb-1">Edad</label>
                    <input type="number" value="2" class="w-full px-4 py-2.5 rounded-xl border border-gray-100 focus:outline-none focus:border-brandOrange bg-white shadow-sm">
                </div>
                <div>
                    <label class="block text-gray-500 text-sm font-medium mb-1">Género</label>
                    <div class="flex space-x-2">
                        <button type="button" class="flex-1 py-2.5 rounded-xl bg-brandOrange text-white font-medium text-sm shadow-sm">Macho</button>
                        <button type="button" class="flex-1 py-2.5 rounded-xl bg-white text-gray-500 border border-gray-100 text-sm font-medium">Hembra</button>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-gray-500 text-sm font-medium mb-1">Raza</label>
                <input type="text" value="Angora" class="w-full px-4 py-2.5 rounded-xl border border-gray-100 focus:outline-none focus:border-brandOrange bg-white shadow-sm">
            </div>

            <div>
                <label class="block text-gray-500 text-sm font-medium mb-1">Descripción</label>
                <textarea rows="3" class="w-full px-4 py-2.5 rounded-xl border border-gray-100 focus:outline-none focus:border-brandOrange bg-white shadow-sm">Gato muy juguetón y cariñoso.</textarea>
            </div>

            <div class="flex items-center justify-between p-2 bg-white rounded-xl border border-gray-50 shadow-sm">
                <span class="text-sm text-gray-600 font-medium flex items-center">
                    <span class="w-2.5 h-2.5 bg-brandGreen rounded-full inline-block mr-2"></span> Vacunado
                </span>
                <input type="checkbox" checked class="w-5 h-5 accent-brandGreen">
            </div>

            <button type="submit" class="w-full bg-brandOrange text-white font-semibold py-3 rounded-xl shadow-md hover:bg-opacity-90 transition mt-6">
                Guardar cambios
            </button>
        </form>

    </div>
</body>
</html>
