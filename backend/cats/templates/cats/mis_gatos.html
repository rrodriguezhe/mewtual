<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewtual - Mis Gatos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandOrange: '#F59E0B', brandCrema: '#FEFBF6', brandGreen: '#10B981' } } } }
    </script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="w-full max-w-md bg-brandCrema min-h-screen shadow-lg flex flex-col p-6 relative pb-24">
        
        <div class="mt-2 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Mis Gatos</h1>
                <p class="text-xs text-gray-400">2 perfiles registrados</p>
            </div>
            <a href="{% url 'cats:crear_perfil' %}" class="w-10 h-10 bg-brandOrange rounded-full flex items-center justify-center text-white text-xl font-bold shadow-md hover:bg-opacity-90 transition">
                +
            </a>
        </div>

        <div class="space-y-4 overflow-y-auto max-h-[70vh] pr-1">
            
            <a href="{% url 'cats:editar_perfil' %}" class="block bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex items-center space-x-4">
                    <img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?q=80&w=150&auto=format&fit=crop" class="w-16 h-16 rounded-full object-cover border-2 border-brandOrange">
                    <div class="flex-1">
                        <div class="flex justify-between items-baseline">
                            <h3 class="font-bold text-gray-800 text-base">Simba</h3>
                            <span class="text-xs font-semibold text-brandOrange bg-orange-50 px-2 py-0.5 rounded-full">12 matches</span>
                        </div>
                        <p class="text-xs text-gray-500 mt-0.5">Angora • 2 años</p>
                        <div class="flex items-center mt-1 text-[11px] text-brandGreen font-medium">
                            <span class="w-2 h-2 bg-brandGreen rounded-full inline-block mr-1"></span> Vacunado
                        </div>
                    </div>
                </div>
            </a>

            <a href="{% url 'cats:editar_perfil' %}" class="block bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex items-center space-x-4">
                    <img src="https://images.unsplash.com/photo-1573865526739-10659fec78a5?q=80&w=150&auto=format&fit=crop" class="w-16 h-16 rounded-full object-cover border-2 border-gray-200">
                    <div class="flex-1">
                        <div class="flex justify-between items-baseline">
                            <h3 class="font-bold text-gray-800 text-base">Cleo</h3>
                            <span class="text-xs font-semibold text-brandOrange bg-orange-50 px-2 py-0.5 rounded-full">8 matches</span>
                        </div>
                        <p class="text-xs text-gray-500 mt-0.5">Bengalí • 3 años</p>
                        <div class="flex items-center mt-1 text-[11px] text-brandGreen font-medium">
                            <span class="w-2 h-2 bg-brandGreen rounded-full inline-block mr-1"></span> Vacunado
                        </div>
                    </div>
                </div>
            </a>

        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-3 flex justify-around items-center shadow-lg rounded-t-2xl">
            <a href="{% url 'matching:home' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
                <span class="text-xs font-medium">Inicio</span>
            </a>
            <a href="{% url 'matching:swipe' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
                <span class="text-xs font-medium">Match</span>
            </a>
            <a href="{% url 'chat:lista_chats' %}" class="flex flex-col items-center text-gray-400 hover:text-brandOrange">
                <span class="text-xs font-medium">Chats</span>
            </a>
            <a href="{% url 'cats:mis_gatos' %}" class="flex flex-col items-center text-brandOrange">
                <span class="text-xs font-medium">Mis Gatos</span>
            </a>
        </div>

    </div>
</body>
</html>
